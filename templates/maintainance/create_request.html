{% extends "base.html" %}
{% block title %}New Maintenance Request{% endblock %}

{% block content %}
<div class="py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h3 mb-1 gradient-text">Create Maintenance Request</h1>
            <p class="text-secondary mb-0">
                Log an issue and let the ML scheduler auto‑assign the best staff.
            </p>
        </div>
    </div>

    <div class="card card-glass shadow-sm border-0">
        <div class="card-body p-4">
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-light">Title<span class="text-danger">*</span></label>
                        <input type="text" name="title" class="form-control"
                               placeholder="e.g. Kitchen tap leaking" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-light">Category (Skill)</label>
                        <select name="category" class="form-select">
                            <option value="ELECTRICAL">Electrical</option>
                            <option value="PLUMBING">Plumbing</option>
                            <option value="CLEANING">Cleaning</option>
                            <option value="SECURITY">Security Systems</option>
                            <option value="GENERAL" selected>General Maintenance</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label text-light">Priority</label>
                        <select name="priority" class="form-select">
                            <option value="1">Low</option>
                            <option value="2" selected>Medium</option>
                            <option value="3">High</option>
                            <option value="4">Critical</option>
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label text-light">Description<span class="text-danger">*</span></label>
                        <textarea name="description" rows="4" class="form-control"
                                  placeholder="Describe the issue, location, and any safety concerns."
                                  required></textarea>
                    </div>
                </div>

                <div class="d-flex justify-content-end mt-4">
                    <a href="/" class="btn btn-outline-light me-2">
                        <i class="fa-solid fa-arrow-left me-1"></i>Cancel
                    </a>
                    <button type="submit" class="btn btn-success">
                        <i class="fa-solid fa-screwdriver-wrench me-1"></i>Submit Request
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
