{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="py-4">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">
            <div class="card card-glass shadow-sm border-0">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <i class="fa-solid fa-lock fa-3x text-info mb-3"></i>
                        <h1 class="h4 mb-0 gradient-text">Sign In</h1>
                    </div>

                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label text-light">Username</label>
                            <input type="text" name="username" class="form-control" required
                                   placeholder="Enter username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">Password</label>
                            <input type="password" name="password" class="form-control" required
                                   placeholder="Enter password">
                        </div>
                        <button type="submit" class="btn btn-info w-100">
                            <i class="fa-solid fa-sign-in-alt me-2"></i>Login
                        </button>
                    </form>

                    <div class="text-center mt-3">
                        <p class="text-secondary small mb-0">
                            No account? Use admin panel to create one.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
