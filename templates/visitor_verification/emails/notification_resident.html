<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
  .card { background: white; max-width: 560px; margin: 0 auto; border-radius: 16px;
          box-shadow: 0 4px 24px rgba(0,0,0,0.1); overflow: hidden; }
  .header { background: linear-gradient(135deg, #1e3a5f 0%, #0369a1 100%);
             padding: 28px 32px; color: white; }
  .header h1 { margin: 0; font-size: 20px; }
  .body { padding: 32px; }
  .visitor-card { background: #f0f9ff; border-left: 4px solid #0369a1;
                   border-radius: 8px; padding: 16px; margin: 16px 0; }
  .tag { display: inline-block; background: #dbeafe; color: #1d4ed8;
          border-radius: 4px; padding: 2px 10px; font-size: 12px; }
  .score { font-size: 28px; font-weight: 800; color: #22c55e; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>🔔 Visitor Notification</h1>
  </div>
  <div class="body">
    <p>Hello <strong>{{ resident_name }}</strong>,</p>
    <p>A visitor has been verified and granted access to visit you.</p>
    <div class="visitor-card">
      <strong style="font-size:18px;">{{ visitor_name }}</strong><br>
      <span class="tag">{{ purpose_category }}</span>
      <p style="margin: 12px 0 4px; color: #475569;">Purpose: {{ purpose }}</p>
      <p style="margin: 0;">
        Face Match: <span class="score">{{ face_score|floatformat:0 }}%</span>
      </p>
    </div>
    <p style="color: #64748b; font-size: 13px;">Visit ID: {{ visit_id }}</p>
  </div>
</div>
</body>
</html>
