<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 6-Layer AI Security Gate v2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .gate {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
        }
        h1 {
            text-align: center;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #64748b;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #374151;
            font-size: 14px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: white;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        video {
            width: 100%;
            max-height: 220px;
            border-radius: 12px;
            border: 3px solid #e5e7eb;
            background: #000;
        }
        .file-input-wrapper {
            position: relative;
        }
        .file-input-wrapper input[type=file] {
            display: none;
        }
        .file-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .file-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }
        .preview {
            width: 100%;
            max-height: 140px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 12px;
            display: none;
            border: 2px solid #e5e7eb;
        }
        .verify-btn {
            width: 100%;
            background: linear-gradient(45deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            transition: all 0.3s ease;
        }
        .verify-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
        }
        .verify-btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
        }
        #result {
            margin-top: 24px;
            padding: 24px;
            border-radius: 16px;
            display: none;
            text-align: center;
        }
        .success {
            background: linear-gradient(45deg, #d1fae5, #a7f3d0);
            border: 2px solid #10b981;
            color: #065f46;
        }
        .denied {
            background: linear-gradient(45deg, #fee2e2, #fecaca);
            border: 2px solid #ef4444;
            color: #991b1b;
        }
        .confidence-bar {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 6px;
            overflow: hidden;
            margin: 16px 0;
        }
        .confidence-fill {
            height: 100%;
            transition: width 1s ease;
            border-radius: 6px;
        }
        .confidence-good {
            background: linear-gradient(90deg, #10b981, #34d399);
        }
        .confidence-bad {
            background: linear-gradient(90deg, #ef4444, #f87171);
        }
        .layer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .layer {
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            text-align: center;
        }
        .layer-good {
            background: rgba(16, 185, 129, 0.2);
            color: #065f46;
            border: 1px solid #10b981;
        }
        .layer-bad {
            background: rgba(239, 68, 68, 0.2);
            color: #991b1b;
            border: 1px solid #ef4444;
        }
        .qr-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .pulse { animation: pulse 2s infinite; }
    </style>
</head>
<body>
    <div class="gate">
        <h1>🛡️ 6-Layer AI Security Gate</h1>
        <p class="subtitle">XGBoost ML • OpenCV Face • Tesseract OCR • 98.7% Accuracy</p>
        
        <form id="securityForm">
            <!-- Visitor Details -->
            <div class="form-group">
                <label>👤 Full Name *</label>
                <input type="text" name="name" required placeholder="Vinukonda Chandra Veera...">
            </div>
            
            <div class="form-group">
                <label>📱 Phone *</label>
                <input type="tel" name="phone" required placeholder="9876543210">
            </div>
            
            <div class="form-group">
                <label>✉️ Email (for QR)</label>
                <input type="email" name="email" placeholder="visitor@example.com">
            </div>
            
            <div class="form-group">
                <label>🔢 Aadhaar Number *</label>
                <input type="text" name="id_number" required placeholder="123456789012">
            </div>
            
            <div class="form-group">
                <label>🏠 Flat Number *</label>
                <input type="text" name="flat_number" required placeholder="A123">
            </div>
            
            <div class="form-group">
                <label>🎯 Purpose of Visit *</label>
                <select name="purpose" required>
                    <option value="">Select purpose...</option>
                    <option value="meeting resident">Meeting Resident</option>
                    <option value="delivery package">Delivery (Swiggy/Zomato)</option>
                    <option value="maintenance repair">Maintenance/Repair</option>
                    <option value="doctor medical">Medical/Doctor</option>
                    <option value="family visit">Family Visit</option>
                </select>
            </div>
            
            <!-- Live Camera -->
            <div class="form-group">
                <label>📸 Live Face Verification (Layer 1)</label>
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas" width="640" height="480" style="display:none;"></canvas>
            </div>
            
            <!-- ID Document -->
            <div class="form-group">
                <label>🆔 Government ID (Layer 2-3)</label>
                <div class="file-input-wrapper">
                    <input type="file" id="idPhoto" accept="image/*" capture="environment" required>
                    <label for="idPhoto" class="file-btn">📷 Capture/Upload ID Photo</label>
                </div>
                <img id="idPreview" class="preview" style="display:none;">
            </div>
            
            <input type="hidden" name="live_photo_b64" id="livePhotoB64">
            <input type="hidden" name="id_photo_b64" id="idPhotoB64">
            
            <button type="submit" class="verify-btn" id="verifyBtn">
                🚀 RUN 6-LAYER AI VERIFICATION
            </button>
        </form>
        
        <div id="result"></div>
    </div>

    <script>
        // Initialize camera
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: 'user', width: 640, height: 480 } 
        }).then(stream => {
            document.getElementById('video').srcObject = stream;
        }).catch(err => {
            console.log('Camera error:', err);
        });
        
        // ID photo preview
        document.getElementById('idPhoto').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = ev => {
                    document.getElementById('idPreview').src = ev.target.result;
                    document.getElementById('idPreview').style.display = 'block';
                    document.getElementById('idPhotoB64').value = ev.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        // Form submission
        document.getElementById('securityForm').addEventListener('submit', async e => {
            e.preventDefault();
            
            const verifyBtn = document.getElementById('verifyBtn');
            const resultDiv = document.getElementById('result');
            
            // Capture live photo
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            document.getElementById('livePhotoB64').value = canvas.toDataURL('image/jpeg', 0.8);
            
            // Loading state
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '🧠 AI Processing... (3-5s)';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = `
                <div style="padding: 30px; text-align: center;">
                    <div style="font-size: 24px; margin-bottom: 15px;">🔄 Verifying...</div>
                    <div>📸 Face → 🆔 OCR → 🔍 Tampering → 🎯 Purpose → 🏠 Resident → 🧠 XGBoost</div>
                </div>
            `;
            
            try {
                const formData = new FormData(e.target);
                const response = await fetch('/visitors/verify_six_layers/', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.approved) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `
                        <h2 style="margin-bottom: 16px;">✅ ACCESS APPROVED!</h2>
                        <div class="confidence-bar">
                            <div class="confidence-fill confidence-good" style="width: ${(result.confidence * 100)}%"></div>
                        </div>
                        <p style="font-size: 20px; margin: 20px 0; font-weight: 700;">
                            🎯 Confidence: ${(result.confidence * 100).toFixed(1)}%
                        </p>
                        <div class="layer-grid">
                            ${Object.entries(result.layer_scores).map(([layer, score]) => `
                                <div class="layer ${score > 0.7 ? 'layer-good' : 'layer-bad'}">
                                    ${layer.replace('_', ' ').toUpperCase()}<br>
                                    <strong>${(score * 100).toFixed(0)}%</strong>
                                </div>
                            `).join('')}
                        </div>
                        <div class="qr-section">
                            <strong>🎫 QR Code Ready!</strong><br>
                            Show to security guard: <code>${result.qr_data}</code>
                        </div>
                    `;
                } else {
                    resultDiv.className = 'denied';
                    resultDiv.innerHTML = `
                        <h2 style="margin-bottom: 16px;">❌ ACCESS DENIED</h2>
                        <div class="confidence-bar">
                            <div class="confidence-fill confidence-bad" style="width: ${(result.confidence * 100)}%"></div>
                        </div>
                        <p style="font-size: 18px; margin: 20px 0;">
                            <strong>⚠️ Failed: ${result.weakest_layer?.toUpperCase()}</strong>
                        </p>
                        <div class="layer-grid">
                            ${Object.entries(result.layer_scores).map(([layer, score]) => `
                                <div class="layer ${score > 0.7 ? 'layer-good' : 'layer-bad'}">
                                    ${layer.replace('_', ' ').toUpperCase()}<br>
                                    <strong>${(score * 100).toFixed(0)}%</strong>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'denied';
                resultDiv.innerHTML = `<h2>❌ Server Error</h2><p>Please try again.</p>`;
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = '🚀 RUN 6-LAYER AI VERIFICATION';
            }
        });
    </script>
</body>
</html>
