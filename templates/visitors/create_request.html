<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- iOS Safari Camera Permissions -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <title>🛡️ 6-Layer AI Security Gate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        .gate-container { 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.15); 
            max-width: 500px; 
            width: 100%; 
            padding: 40px; 
        }
        h1 { 
            text-align: center; 
            background: linear-gradient(45deg, #28a745, #20c997);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 28px; 
            margin-bottom: 10px; 
        }
        .subtitle { text-align: center; color: #6c757d; margin-bottom: 30px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; color: #495057; font-weight: 600; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e9ecef; border-radius: 12px; font-size: 16px; transition: all 0.3s; }
        input:focus, select:focus { border-color: #007bff; box-shadow: 0 0 0 4px rgba(0,123,255,0.1); outline: none; }
        .file-input-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .file-input-wrapper input[type=file] { position: absolute; left: -9999px; }
        .file-label { 
            display: block; padding: 15px; background: linear-gradient(45deg, #6c757d, #5a6268); 
            color: white; text-align: center; border-radius: 12px; cursor: pointer; 
            transition: all 0.3s; font-size: 16px; 
        }
        .file-label:hover { background: linear-gradient(45deg, #5a6268, #495057); }
        .file-label.success { background: linear-gradient(45deg, #28a745, #20c997) !important; }
        .preview { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 2px solid #e9ecef; display: none; }
        button { 
            width: 100%; padding: 18px; background: linear-gradient(45deg, #28a745, #20c997); 
            color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: 600; 
            cursor: pointer; transition: all 0.3s; margin-top: 10px; 
        }
        button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(40,167,69,0.3); }
        button:disabled { background: #6c757d; cursor: not-allowed; transform: none; }
        #results { margin-top: 25px; padding: 25px; border-radius: 15px; text-align: center; display: none; }
        .approved { background: linear-gradient(135deg, #d4edda, #c3e6cb); color: #155724; border: 3px solid #28a745; }
        .rejected { background: linear-gradient(135deg, #f8d7da, #f5c6cb); color: #721c24; border: 3px solid #dc3545; }
        .layer-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin: 20px 0; }
        .layer-item { padding: 12px; border-radius: 10px; font-weight: 600; text-align: center; }
        .layer-good { background: rgba(40,167,69,0.2); color: #28a745; }
        .layer-bad { background: rgba(220,53,69,0.2); color: #dc3545; }
        .confidence-bar { width: 100%; height: 25px; background: #e9ecef; border-radius: 12px; overflow: hidden; margin: 15px 0; }
        .confidence-fill { height: 100%; transition: width 1s ease; border-radius: 12px; }
        .confidence-good { background: linear-gradient(90deg, #28a745, #20c997); }
        .confidence-bad { background: linear-gradient(90deg, #dc3545, #e74c3c); }
        .camera-status { font-size: 14px; color: #28a745; font-weight: 500; margin-top: 5px; }
        /* camera grid enhancements */
        .camera-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 15px;
            width: 100%;
            box-sizing: border-box;
        }
        .camera-container video,
        .camera-container img {
            width: 100%;
            height: auto;
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            object-fit: cover;
        }
        .camera-container h3 {
            margin-bottom: 8px;
            font-size: 1.25rem;
        }
        .grid-cols-1 { display: grid; grid-template-columns: 1fr; }
        @media (min-width: 1024px) {
            .lg\:grid-cols-2 { grid-template-columns: repeat(2,1fr); }
        }
        .gap-8 { gap: 2rem; }
        .mb-8 { margin-bottom: 2rem; }
    </style>
</head>
<body>
    <div class="gate-container">
        <h1>🛡️ 6-Layer Security Gate</h1>
        <p class="subtitle">XGBoost 99.5% | MediaPipe Face Detection</p>

        <form id="securityForm" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="hidden" name="live_photo_b64" id="livePhotoHidden" />
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Live Camera -->
            <div class="space-y-4 camera-container">
                <h3 class="text-2xl font-semibold">📸 Live Verification</h3>
                <video id="video" autoplay muted playsinline 
                       class="w-full rounded-2xl shadow-2xl border-4 border-blue-500/30"></video>
                <canvas id="canvas" class="hidden" width="640" height="480"></canvas>
                <img id="livePreview" class="preview" alt="Captured face preview" style="display:none;" />
                <div id="cameraStatus" class="camera-status" style="display:none;">📷 Camera ready</div>
            </div>
            <!-- ID Photo -->
            <div class="form-group camera-container">
                <label>🆔 ID Document (Layer 2 - Tampering Detection)</label>
                <div class="file-input-wrapper">
                    <input type="file" id="idPhoto" name="id_photo_b64" accept="image/*">
                    <label for="idPhoto" id="idPhotoLabel" class="file-label">📄 Upload ID Photo</label>
                </div>
                <img id="idPreview" class="preview" alt="ID preview">
                <div id="idStatus" class="camera-status" style="display: none;">✅ ID photo uploaded</div>
            </div>

            <!-- Form Fields - EXACT Django views.py match -->
            <div class="form-group">
                <label for="name">👤 Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="phone">📱 Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="9876543210" pattern="\d{10}" required>
            </div>

            <div class="form-group">
                <label for="id_number">🔢 Aadhar / ID Number</label>
                <input type="text" id="id_number" name="id_number" placeholder="123456789012" required>
            </div>

            <div class="form-group">
                <label for="flat_number">🏠 Flat Number</label>
                <input type="text" id="flat_number" name="flat_number" placeholder="A-101" required>
            </div>

            <div class="form-group">
                <label for="purpose">🎯 Purpose of Visit</label>
                <select id="purpose" name="purpose" required>
                    <option value="">Select purpose...</option>
                    <option value="meeting">Meeting Resident</option>
                    <option value="delivery">Delivery</option>
                    <option value="family">Family Visit</option>
                    <option value="maintenance">Maintenance</option>
                    <option value="doctor">Doctor</option>
                    <option value="guest">Guest</option>
                </select>
            </div>

            <button type="submit" id="verifyBtn">🚀 RUN 6-LAYER VERIFICATION</button>
        </form>

        <div id="results"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('securityForm');
            const verifyBtn = document.getElementById('verifyBtn');
            const resultsDiv = document.getElementById('results');

            if (!form || !verifyBtn || !resultsDiv) return;

            // Camera and preview elements
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            const livePreviewImg = document.getElementById('livePreview');
            const cameraStatusDiv = document.getElementById('cameraStatus');

            const idPhotoInput = document.getElementById('idPhoto');
            const idPhotoLabel = document.getElementById('idPhotoLabel');
            const idPreview = document.getElementById('idPreview');
            const idStatus = document.getElementById('idStatus');

            navigator.mediaDevices.getUserMedia({video: {width: 640, height: 480, facingMode: 'user'}})
                .then(s => {
                    stream = s;
                    video.srcObject = s;
                    cameraStatusDiv.style.display = 'block';
                })
                .catch(err => {
                    console.error('Camera error:', err);
                    cameraStatusDiv.textContent = '🚫 Camera unavailable';
                    cameraStatusDiv.style.color = '#dc3545';
                    cameraStatusDiv.style.display = 'block';
                });

            if (idPhotoInput) {
                idPhotoInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            idPreview.src = e.target.result;
                            idPreview.style.display = 'block';
                            idPhotoLabel.classList.add('success');
                            idPhotoLabel.innerHTML = '✅ ID Photo Ready';
                            idStatus.style.display = 'block';
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }

            // ID photo preview
            if (idPhotoInput) {
                idPhotoInput.addEventListener('change', function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            idPreview.src = e.target.result;
                            idPreview.style.display = 'block';
                            idPhotoLabel.classList.add('success');
                            idPhotoLabel.innerHTML = '✅ ID Photo Ready';
                            idStatus.style.display = 'block';
                        };
                        reader.readAsDataURL(file);
                    }
                });
            }

            // Form submission - POST to Django verify_six_layers
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                // Validate ALL required fields
                const required = ['name', 'phone', 'id_number', 'flat_number', 'purpose'];
                for (let id of required) {
                    const field = document.getElementById(id);
                    if (!field?.value.trim()) {
                        alert(`❌ Please fill ${id.replace('_', ' ')}`);
                        field?.focus();
                        return;
                    }
                }

                // capture webcam snapshot
                try {
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    const photoData = canvas.toDataURL('image/jpeg', 0.8);
                    if (livePreviewImg) {
                        livePreviewImg.src = photoData;
                        livePreviewImg.style.display = 'block';
                    }
                    document.getElementById('livePhotoHidden').value = photoData;
                } catch (err) {
                    console.warn('Snapshot failed', err);
                }

                // Show loading
                verifyBtn.disabled = true;
                verifyBtn.innerHTML = '🔄 Running 6-Layer AI Analysis...';
                resultsDiv.style.display = 'block';
                resultsDiv.innerHTML = `
                    <div style="padding: 30px; text-align: center; color: #007bff;">
                        <div style="font-size: 24px; margin-bottom: 15px;">🧠 Processing...</div>
                        <div>📸 Face → 🆔 ID → 🔢 Format → 🎯 Purpose → 🏠 Resident → 📱 Behavior</div>
                    </div>
                `;

                try {
                    const formData = new FormData(form);
                    const response = await fetch('', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const result = await response.json();

                    // SUCCESS - Show 6-layer results
                    if (result.approved) {
                        resultsDiv.innerHTML = `
                            <div class="approved">
                                <h2 style="margin-bottom: 15px;">✅ ACCESS APPROVED! 🎉</h2>
                                <div class="confidence-bar">
                                    <div class="confidence-fill confidence-good" 
                                         style="width: ${(result.confidence * 100)}%"></div>
                                </div>
                                <p style="font-size: 18px; margin: 15px 0;">
                                    <strong>🎯 XGBoost Confidence: ${(result.confidence * 100).toFixed(1)}%</strong>
                                </p>
                                <div class="layer-grid">
                                    ${Object.entries(result.layer_scores || {}).map(([layer, score]) => `
                                        <div class="layer-item layer-${score > 0.7 ? 'good' : 'bad'}">
                                            ${layer}<br><strong>${(score * 100).toFixed(1)}%</strong>
                                        </div>
                                    `).join('')}
                                </div>
                                <div style="margin-top: 20px; padding: 15px; background: rgba(40,167,69,0.1); border-radius: 10px;">
                                    <strong>🎫 QR Code Ready! Show to Security Guard</strong>
                                </div>
                            </div>
                        `;
                    } else {
                        // FAILED - Show rejection details
                        resultsDiv.innerHTML = `
                            <div class="rejected">
                                <h2 style="margin-bottom: 15px;">❌ ACCESS DENIED 🚫</h2>
                                <div class="confidence-bar">
                                    <div class="confidence-fill confidence-bad" 
                                         style="width: ${(result.confidence * 100)}%"></div>
                                </div>
                                <p style="font-size: 18px; margin: 15px 0;">
                                    <strong>⚠️ Failed Layer: ${result.failed_layer?.toUpperCase() || 'UNKNOWN'}</strong>
                                </p>
                                <div class="layer-grid">
                                    ${Object.entries(result.layer_scores || {}).map(([layer, score]) => `
                                        <div class="layer-item layer-${score > 0.7 ? 'good' : 'bad'}">
                                            ${layer}<br><strong>${(score * 100).toFixed(1)}%</strong>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }
                } catch (error) {
                    console.error('Verification error:', error);
                    resultsDiv.innerHTML = `
                        <div class="rejected" style="text-align: center;">
                            <h2>❌ Server Error</h2>
                            <p>Verification failed. Please check your inputs and try again.</p>
                            <details style="margin-top: 10px; text-align: left; font-size: 12px;">
                                ${error.message}
                            </details>
                        </div>
                    `;
                } finally {
                    verifyBtn.disabled = false;
                    verifyBtn.innerHTML = '🚀 RUN 6-LAYER VERIFICATION';
                }
            });
        });
    </script>
</body>
</html>
