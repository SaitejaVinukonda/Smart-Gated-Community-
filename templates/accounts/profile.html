{% extends "base.html" %}
{% block title %}Profile{% endblock %}

{% block content %}
<div class="py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-6">
            <div class="card-glass text-center p-5">
                <div class="mb-4">
                    <i class="fa-solid fa-user-circle fa-5x text-primary mb-3"></i>
                    <h1 class="h2 mb-1">{{ user.username }}</h1>
                    <p class="text-muted mb-0">{{ role_display }}</p>
                </div>
                
                <div class="row g-3 mb-4">
                    <div class="col-6">
                        <div class="card bg-primary bg-opacity-10 border-0 text-center p-3">
                            <i class="fa-solid fa-home fa-2x mb-2 text-primary"></i>
                            <div>{{ user.flat_number|default:"Not set" }}</div>
                        </div>
                    </div>
                    <div class="col-6">
                        <div class="card bg-success bg-opacity-10 border-0 text-center p-3">
                            <i class="fa-solid fa-phone fa-2x mb-2 text-success"></i>
                            <div>{{ user.phone|default:"Not set" }}</div>
                        </div>
                    </div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="/" class="btn btn-outline-light">
                        <i class="fa-solid fa-house me-2"></i>Home
                    </a>
                    <a href="/admin/" class="btn btn-primary">
                        <i class="fa-solid fa-gauge-high me-2"></i>Admin
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
